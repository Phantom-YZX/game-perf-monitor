name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Qt 6 app on Windows
    runs-on: windows-2022

    env:
      GPM_VCPKG_ROOT: C:\vcpkg
      BUILD_DIR: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          arch: win64_msvc2022_64
          modules: qtcharts qt5compat
          cache: true

      - name: Set up vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path "$env:GPM_VCPKG_ROOT\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg.git "$env:GPM_VCPKG_ROOT"
            & "$env:GPM_VCPKG_ROOT\bootstrap-vcpkg.bat"
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B "$env:BUILD_DIR" -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:GPM_VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DQt6_DIR="$env:Qt6_DIR" `
            -DGAME_PERF_ENABLE_MOCK=ON

      - name: Build Debug
        shell: pwsh
        run: cmake --build "$env:BUILD_DIR" --config Debug --parallel

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          $exe = Join-Path $env:GITHUB_WORKSPACE "$env:BUILD_DIR\Debug\GamePerfMonitor.exe"
          if (!(Test-Path $exe)) {
            throw "GamePerfMonitor.exe was not found at $exe"
          }

          $windeployqt = Join-Path (Resolve-Path "$env:Qt6_DIR\..\..\..\bin") "windeployqt.exe"
          if (!(Test-Path $windeployqt)) {
            throw "windeployqt.exe was not found at $windeployqt"
          }

          & $windeployqt --no-translations --compiler-runtime $exe

      - name: Create artifact folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item "$env:BUILD_DIR\Debug\*" artifact -Recurse -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GamePerfMonitor-Windows-Debug
          path: artifact
